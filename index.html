<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cosmo</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --text-color: #e0e0e0;
            --accent: #4cc9f0;
            --card-bg: #161b22;
        }

        .light-theme {
            --bg-color: #f0f2f5;
            --text-color: #1a1a1a;
            --accent: #0077b6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: 0.3s;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 40px 0; }
        h1 { color: var(--accent); margin: 0; font-size: 2.5rem; }

        .theme-btn {
            position: fixed; top: 20px; right: 20px;
            padding: 10px 15px; border-radius: 20px;
            border: none; background: var(--accent);
            cursor: pointer; font-weight: bold;
        }

        /* Destaque da NASA */
        .nasa-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 40px;
            border: 2px solid var(--accent);
        }

        .nasa-card img { width: 100%; border-radius: 10px; max-height: 500px; object-fit: cover; }

        /* Grelha de Notícias */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; flex-grow: 1; }
        
        footer { text-align: center; padding: 40px; opacity: 0.6; font-size: 0.8rem; }

        .error-msg { color: #ff4d4d; border: 1px solid #ff4d4d; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">🌓 Alternar Tema</button>

    <div class="container">
        <header>
            <h1>🌠 Portal do Cosmo</h1>
            <p>Exploração espacial em tempo real</p>
        </header>

        <section id="nasa-section">
            <div class="nasa-card">
                <h2>Cena de Hoje na NASA</h2>
                <div id="nasa-content">Carregando maravilhas do espaço...</div>
            </div>
        </section>

        <h2>Últimos Lançamentos e Descobertas</h2>
        <div id="news-grid" class="news-grid">
            <p>A procurar notícias...</p>
        </div>
    </div>

    <footer>
        <p>&copy; <span id="year"></span> - Criado por Givanaldo | Dados oficiais da NASA e Spaceflight API</p>
    </footer>

    <script>
        // 1. Alternar Tema
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        document.getElementById('year').textContent = new Date().getFullYear();

        // 2. Buscar Imagem da NASA (NASA APOD)
        async function fetchNasa() {
            const container = document.getElementById('nasa-content');
            try {
                // Usamos 'DEMO_KEY' que é gratuita e funciona direto
                const res = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
                const data = await res.json();
                
                container.innerHTML = `
                    <h3>${data.title}</h3>
                    <img src="${data.url}" alt="${data.title}">
                    <p>${data.explanation.substring(0, 300)}...</p>
                `;
            } catch (e) {
                container.innerHTML = "Não foi possível carregar a imagem da NASA.";
            }
        }

        // 3. Buscar Notícias Espaciais (CORS-Friendly)
        async function fetchNews() {
            const grid = document.getElementById('news-grid');
            try {
                // Esta API não exige chave e permite CORS total
                const res = await fetch('https://api.spaceflightnewsapi.net/v4/articles/?limit=6');
                const data = await res.json();
                
                grid.innerHTML = '';
                data.results.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${item.image_url}" alt="Notícia">
                            <div class="card-content">
                                <h3>${item.title}</h3>
                                <p>${item.summary.substring(0, 100)}...</p>
                                <a href="${item.url}" target="_blank" style="color:var(--accent); font-weight:bold; text-decoration:none;">LER MAIS</a>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = "<p class='error-msg'>Erro ao carregar notícias. Tenta desativar bloqueadores de anúncios.</p>";
            }
        }

        // Iniciar
        fetchNasa();
        fetchNews();
    </script>
</body>
</html>
