<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploração Espacial - Notícias</title>
    <style>
        /* CSS: Estilo Espacial */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #05070a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: #64dfdf;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }

        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: #11141d;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #64dfdf;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            color: #fff;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .card-text {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        .btn-link {
            color: #64dfdf;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1px solid #64dfdf;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-link:hover {
            background: #64dfdf;
            color: #000;
        }

        .loading { color: #64dfdf; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌠 Astronomia Hoje</h1>
        <p class="subtitle">As últimas notícias do universo em português</p>

        <div id="news-grid">
            <p class="loading">A procurar novidades nas estrelas...</p>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO: Coloca aqui a tua chave da GNews API
        const API_KEY = 'affc2a5fd1deb4ee42e51b90a767ac67'; 
        const URL = `https://gnews.io/api/v4/search?q=astronomia OR "exploração espacial"&lang=pt&country=pt&max=9&apikey=${API_KEY}`;

        async function carregarNoticias() {
            const grid = document.getElementById('news-grid');

            try {
                const resposta = await fetch(URL);
                const dados = await resposta.json();

                if (dados.articles && dados.articles.length > 0) {
                    grid.innerHTML = ''; // Limpa o aviso de carregamento

                    dados.articles.forEach(artigo => {
                        const template = `
                            <div class="card">
                                <img src="${artigo.image}" alt="Imagem da notícia">
                                <div class="card-body">
                                    <h3 class="card-title">${artigo.title}</h3>
                                    <p class="card-text">${artigo.description.substring(0, 120)}...</p>
                                    <a href="${artigo.url}" target="_blank" class="btn-link">LER MAIS</a>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += template;
                    });
                } else {
                    grid.innerHTML = '<p>Nenhuma notícia encontrada no momento.</p>';
                }
            } catch (erro) {
                grid.innerHTML = '<p>Erro ao ligar ao servidor de notícias. Verifica a tua API Key.</p>';
                console.error("Erro na API:", erro);
            }
        }

        carregarNoticias();
    </script>
</body>
</html>
