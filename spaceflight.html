<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias do Cosmo</title>
    <style>
        /* CSS: Estilo da Página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0d17; /* Azul muito escuro (espaço) */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #4cc9f0;
            text-shadow: 2px 2px 10px rgba(76, 201, 240, 0.5);
        }

        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
        }

        .news-card {
            background-color: #1a1c2c;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid #333;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: #4cc9f0;
        }

        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .news-content {
            padding: 15px;
        }

        .news-title {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: #f1f1f1;
        }

        .news-summary {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 15px;
        }

        .read-more {
            text-decoration: none;
            color: #4cc9f0;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>🌠 Notícias de Astronomia</h1>
    <p>As últimas novidades do universo em tempo real.</p>

    <div id="news-container">
        <p>A carregar notícias do espaço...</p>
    </div>

    <script>
        // JavaScript: Lógica para procurar as notícias
        async function fetchSpaceNews() {
            const container = document.getElementById('news-container');
            
            try {
                // Chamada à API de notícias espaciais
                const response = await fetch('https://api.spaceflightnewsapi.net/v4/articles/?limit=10');
                const data = await response.json();
                
                // Limpar a mensagem de "A carregar"
                container.innerHTML = '';

                // Criar um cartão para cada notícia
                data.results.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'news-card';

                    card.innerHTML = `
                        <img src="${article.image_url}" alt="Imagem da notícia">
                        <div class="news-content">
                            <h3 class="news-title">${article.title}</h3>
                            <p class="news-summary">${article.summary.substring(0, 150)}...</p>
                            <a href="${article.url}" target="_blank" class="read-more">Ler notícia completa →</a>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = '<p>Erro ao carregar notícias. Tenta novamente mais tarde.</p>';
                console.error("Erro:", error);
            }
        }

        // Executa a função assim que a página abre
        fetchSpaceNews();
    </script>
</body>
</html>
